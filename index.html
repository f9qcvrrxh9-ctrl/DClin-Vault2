<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-title" content="DClin Vault">
    <title>DClin Vault</title>
    
    <style>
        :root {
            --c0: #F9C469; --c1: #FAA874; --c2: #FB8C7F;
            --c3: #FC708A; --c4: #FD5495; --c5: #FE38A0;
            --v0: #1a0a24; --v1: #140a24; --v2: #0a1124; 
            --v3: #0a2024; --v4: #0a2417; --v5: #241b0a; 

            --active-accent: var(--c0);
            --active-vibe: var(--v5);
            --warm-white: #e8e6e1; 
            --warm-white-glow: rgba(232, 230, 225, 0.4); 
            
            --filter-accent: var(--warm-white-glow);
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.18);
            --orb-x: 50%; --orb-y: -10%;
            --task-blue: #007AFF;
        }

        body {
            margin: 0; background-color: #050508; color: white;
            font-family: -apple-system, system-ui, sans-serif;
            min-height: 100vh; overflow-x: hidden;
        }

        .vibe-orb {
            position: fixed; top: var(--orb-y); left: var(--orb-x); 
            transform: translate(-50%, -50%); width: 160%; height: 70%;
            background: radial-gradient(circle, var(--active-vibe) 0%, transparent 80%);
            filter: blur(90px); z-index: -1; 
            transition: all 2s cubic-bezier(0.23, 1, 0.32, 1);
            will-change: transform, background;
        }

        .app-container { padding: 40px 25px 60px; max-width: 420px; margin: auto; }

        .archive-header { 
            font-size: 10px; text-transform: uppercase; letter-spacing: 4px; opacity: 0.35; 
            margin-bottom: 22px; text-align: center; font-weight: 600;
        }

        .input-box {
            background: var(--glass); border-radius: 32px; padding: 25px;
            backdrop-filter: blur(50px); -webkit-backdrop-filter: blur(50px);
            border: 1px solid var(--border);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), 0 0 30px var(--active-accent);
            transition: all 0.8s ease; transform: translateZ(0);
            margin-top: 10px;
        }

        textarea {
            width: 100%; height: 140px; background: transparent; border: none;
            color: white; font-size: 20px; outline: none; resize: none;
            font-family: inherit; font-weight: 300; line-height: 1.5;
        }

        .icon-row { display: flex; justify-content: space-between; gap: 8px; }
        #inputIcons { margin: 45px 0 35px; }

        .sq-btn {
            width: 44px; height: 44px; border-radius: 14px;
            border: 1px solid var(--border); background: var(--glass);
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1); padding: 0;
        }

        .sq-btn svg { width: 20px; height: 20px; opacity: 0.35; transition: 0.4s; }
        .sq-btn.active { transform: scale(1.15) translateY(-4px); border-color: white; }
        
        #inputIcons .sq-btn.active { box-shadow: 0 0 15px var(--active-accent); }
        #filterIcons .sq-btn.active.ic0 { box-shadow: 0 0 15px var(--c0); }
        #filterIcons .sq-btn.active.ic1 { box-shadow: 0 0 15px var(--c1); }
        #filterIcons .sq-btn.active.ic2 { box-shadow: 0 0 15px var(--c2); }
        #filterIcons .sq-btn.active.ic3 { box-shadow: 0 0 15px var(--c3); }
        #filterIcons .sq-btn.active.ic4 { box-shadow: 0 0 15px var(--c4); }
        #filterIcons .sq-btn.active.ic5 { box-shadow: 0 0 15px var(--c5); }
        #filterIcons .sq-btn.all-btn.active { box-shadow: 0 0 15px var(--warm-white-glow); border-color: var(--warm-white); }
        
        .ic0 svg { fill: var(--c0); } .ic1 svg { fill: var(--c1); }
        .ic2 svg { fill: var(--c2); } .ic3 svg { fill: var(--c3); }
        .ic4 svg { fill: var(--c4); } .ic5 svg { fill: var(--c5); }
        .sq-btn.active svg { opacity: 1; }

        .action-row-input { display: flex; gap: 12px; margin-bottom: 45px; }
        .date-btn {
            flex: 1; background: var(--glass); border: 1px solid var(--border);
            border-radius: 22px; color: rgba(255,255,255,0.6); padding: 18px; 
            font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px;
            cursor: pointer; position: relative; display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        #dueDatePicker { position: absolute; top:0; left:0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }

        .save-btn {
            flex: 1; padding: 18px; border-radius: 22px; 
            background: rgba(0, 0, 0, 0.5); border: 1px solid var(--active-accent);
            color: var(--active-accent); text-shadow: 0 0 15px var(--active-accent);
            font-weight: 700; text-transform: uppercase; letter-spacing: 2px; font-size: 10px;
        }

        /* RE-ADDED SAVE ANIMATION */
        .save-btn.pulse { animation: btnPulse 0.4s ease-out; }
        @keyframes btnPulse { 0% { transform: scale(1); } 50% { transform: scale(0.96); background: rgba(255,255,255,0.1); } 100% { transform: scale(1); } }

        #searchWrapper {
            background: rgba(12, 12, 18, 0.85); border-radius: 20px; padding: 15px 20px;
            border: 1px solid var(--border); margin-bottom: 15px;
            display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 0 20px var(--filter-accent); backdrop-filter: blur(30px);
            transition: box-shadow 0.5s ease;
        }
        #searchWrapper input { background: transparent; border: none; color: white; width: 85%; outline: none; font-size: 17px; }

        #vaultWindow, #completedVaultScroll {
            max-height: 400px; overflow-y: auto; scrollbar-width: none;
            margin-top: 15px; padding: 0 12px;
            -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 10%, black 90%, transparent 100%);
        }
        #completedVaultScroll { max-height: 300px; margin-top: 10px; }
        #vaultWindow::-webkit-scrollbar, #completedVaultScroll::-webkit-scrollbar { display: none; }

        .all-btn { color: rgba(255,255,255,0.8) !important; font-weight: 700 !important; }
        .all-btn.active { color: #fff !important; }

        .note {
            background: rgba(255,255,255,0.04); border-radius: 18px; 
            padding: 16px 20px; margin-top: 14px; border-left: 3px solid var(--note-color);
            backdrop-filter: blur(15px); animation: noteAppear 0.5s ease forwards;
            position: relative; overflow: hidden;
            transition: all 0.5s ease;
        }

        .note.completing::after {
            content: ''; position: absolute; top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg); animation: sweep 0.5s ease forwards;
        }
        @keyframes sweep { 100% { left: 150%; } }
        @keyframes noteAppear { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .note-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; }
        .note-body { font-size: 12px; line-height: 1.6; opacity: 0.85; }
        .preview-text { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

        .action-row { display: flex; gap: 15px; margin-top: 12px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 10px; }
        .action-btn { background: transparent; border: none; font-size: 9px; font-weight: 700; color: white; opacity: 0.5; cursor: pointer; text-transform: uppercase; }
        .done-btn { color: #34C759; opacity: 1; }

        .calendar-container {
            background: var(--glass); border-radius: 24px; border: 1px solid var(--border);
            padding: 22px; margin-bottom: 25px; backdrop-filter: blur(30px);
        }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .cal-day { font-size: 11px; padding: 12px 0; text-align: center; cursor: pointer; border-radius: 12px; position: relative; color: rgba(255,255,255,0.35); }
        .cal-day.today { color: white; font-weight: 700; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.03); }
        .dot { width: 4px; height: 4px; border-radius: 50%; background: var(--task-blue); margin: 2px auto 0; }

        .collapsible-trigger {
            width: 100%; padding: 20px; background: var(--glass); border: 1px solid var(--border);
            border-radius: 20px; color: rgba(255,255,255,0.8); font-size: 10px; font-weight: 600;
            text-transform: uppercase; letter-spacing: 2.5px; cursor: pointer; margin-top: 10px; margin-bottom: 10px;
        }
        #completedVault { display: none; padding-bottom: 20px; }

        /* FOOTER TIGHTENING */
        .backup-footer { margin-top: 15px; display: flex; flex-direction: column; gap: 8px; padding-bottom: 60px; }
        .footer-btn { 
            background: transparent; border: none; font-size: 9px; font-weight: 700; color: white; 
            opacity: 0.3; cursor: pointer; text-transform: uppercase; padding: 8px;
            transition: all 0.3s ease; border-radius: 10px;
        }
        .footer-btn:active { opacity: 1; box-shadow: 0 0 15px var(--warm-white-glow); background: var(--glass); }

        #helpContent { 
            display: block; 
            padding: 15px; background: var(--glass); border-radius: 15px; 
            font-size: 10px; line-height: 1.4; color: rgba(255,255,255,0.5); border: 1px solid var(--border); 
        }
    </style>
</head>
<body>

    <div class="vibe-orb" id="vibeOrb"></div>

    <div class="app-container">
        <div class="archive-header">Capture Note</div>
        <div class="input-box">
            <textarea id="noteInput" placeholder="Write your university note here"></textarea>
        </div>
        
        <div class="icon-row" id="inputIcons"></div>

        <div class="action-row-input">
            <div class="date-btn">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="opacity:0.6"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                <span id="dateLabel">Due Date</span>
                <input type="date" id="dueDatePicker" onchange="updateDateLabel()">
            </div>
            <button class="save-btn" id="saveAction" onclick="saveNote()">Save Task</button>
        </div>

        <div class="archive-header" id="listsHeader">Lists</div>
        <div id="searchWrapper">
            <input type="text" id="searchInput" placeholder="Search tasks..." oninput="renderNotes()">
            <button onclick="exportFilteredNotes()" style="background:none; border:none; opacity:0.4; cursor:pointer;"><svg width="18" height="18" fill="white" viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg></button>
        </div>

        <div class="icon-row" id="filterIcons">
            <button class="sq-btn all-btn active" onclick="setFilter('All', this, 'var(--warm-white-glow)')" style="font-size:9px;">ALL</button>
        </div>

        <div id="vaultWindow">
            <div id="notesList"></div>
        </div>

        <div class="archive-header" style="margin-top:20px;">Calendar</div>
        <div class="calendar-container">
            <div class="calendar-grid" id="calendarGrid"></div>
        </div>

        <button class="collapsible-trigger" onclick="toggleCompleted()">View Completed</button>
        <div id="completedVault">
            <div id="completedVaultScroll">
                <div id="completedList"></div>
            </div>
            <button class="action-btn" style="width:100%; margin-top:20px; opacity:0.3; font-size:8px;" onclick="clearAllCompleted()">Clear All Completed</button>
        </div>

        <div class="backup-footer">
            <button class="footer-btn" onclick="fullBackup()">Download Full Vault Backup</button>
            <button class="footer-btn" onclick="triggerRestore()">Restore Vault from Backup</button>
            <input type="file" id="restoreInput" style="display: none;" accept=".json" onchange="handleRestore(event)">
            <button class="footer-btn" onclick="toggleHelp()">Help</button>
            <div id="helpContent">
                System updates or clearing browser cache can wipe app data. Backups are saved to your phone's Downloads folder. To recover data, use the Restore option and select your backup file from that folder.
            </div>
        </div>
    </div>

    <script>
        const svgs = [
            '<svg viewBox="0 0 24 24"><path d="M12 3L1 9l11 6 9-4.91V17h2V9L12 3z"/></svg>', 
            '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12c0 1.1.9 2 2 2s2-.9 2-2c0-4.41 3.59-8 8-8s8 3.59 8 8c0 1.1.9 2 2 2s2-.9 2-2c0-5.52-4.48-10-10-10z"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8.3.59 8 8-3.59 8-8 8z"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16H5V8h14v11z"/></svg>',
            '<svg viewBox="0 0 24 24"><path d="M12 15.5l-1.5-3.5L7 10.5 10.5 9 12 5.5l1.5 3.5L17 10.5l-3.5 1.5L12 15.5z"/></svg>'
        ];

        const tagLabels = ["University", "Neuro", "CBT", "Systemic", "Placement", "Other"];
        const tagPrompts = ["Write your university note here", "Write your neuro note here", "Write your CBT note here", "Write your systemic note here", "Write your placement note here", "Write your note here"];
        const tagColors = ['var(--c0)', 'var(--c1)', 'var(--c2)', 'var(--c3)', 'var(--c4)', 'var(--c5)'];
        const tagMoods = ['var(--v0)', 'var(--v1)', 'var(--v2)', 'var(--v3)', 'var(--v4)', 'var(--v5)'];
        const orbRadialPath = [['30%','10%'], ['70%','10%'], ['85%','35%'], ['70%','65%'], ['30%','65%'], ['15%','35%']];

        let writeIdx = 0; let archiveFilter = 'All'; let dateFilter = null; let editingId = null;
        let currentCalDate = new Date();

        svgs.forEach((svg, i) => {
            const b1 = document.createElement('button');
            b1.className = `sq-btn ic${i}`; b1.innerHTML = svg;
            b1.onclick = () => {
                writeIdx = i;
                document.documentElement.style.setProperty('--active-accent', tagColors[i]);
                document.documentElement.style.setProperty('--active-vibe', tagMoods[5-i]);
                document.documentElement.style.setProperty('--orb-x', orbRadialPath[i][0]);
                document.documentElement.style.setProperty('--orb-y', orbRadialPath[i][1]);
                document.getElementById('noteInput').placeholder = tagPrompts[i];
                document.querySelectorAll('#inputIcons .sq-btn').forEach((b, idx) => b.classList.toggle('active', idx===i));
            };
            document.getElementById('inputIcons').appendChild(b1);

            const b2 = document.createElement('button');
            b2.className = `sq-btn ic${i}`; b2.innerHTML = svg;
            b2.onclick = () => setFilter(tagLabels[i], b2, tagColors[i]);
            document.getElementById('filterIcons').appendChild(b2);
        });

        function updateDateLabel() {
            const val = document.getElementById('dueDatePicker').value;
            document.getElementById('dateLabel').innerText = val ? val.split('-').reverse().slice(0,2).join('/') : "Due Date";
        }

        function setFilter(f, btn, accent) {
            archiveFilter = f; dateFilter = null;
            document.documentElement.style.setProperty('--filter-accent', accent);
            document.querySelectorAll('#filterIcons .sq-btn').forEach(b => b.classList.remove('active'));
            if(btn) btn.classList.add('active');
            renderNotes();
        }

        function saveNote() {
            const btn = document.getElementById('saveAction');
            const inputField = document.getElementById('noteInput');
            const dateField = document.getElementById('dueDatePicker');
            
            // PULSE TRIGGER
            btn.classList.add('pulse'); setTimeout(() => btn.classList.remove('pulse'), 400);
            
            const val = inputField.value.trim();
            if(!val) return;
            let data = JSON.parse(localStorage.getItem('dclinData')) || [];
            const newEntry = {
                id: editingId || Date.now(),
                text: val, tag: tagLabels[writeIdx], color: tagColors[writeIdx],
                created: new Date().toISOString().split('T')[0],
                deadline: dateField.value || null, done: false,
                completedOn: null
            };
            if(editingId) {
                const idx = data.findIndex(n => n.id === editingId);
                data[idx] = newEntry; editingId = null; btn.innerText = "Save Task";
            } else { data.unshift(newEntry); }
            localStorage.setItem('dclinData', JSON.stringify(data));
            inputField.value = ""; dateField.value = ""; updateDateLabel();
            renderNotes(); renderCalendar();
        }

        function toggleDone(id, btnElement) {
            const tile = btnElement.closest('.note');
            tile.classList.add('completing');
            setTimeout(() => {
                let data = JSON.parse(localStorage.getItem('dclinData')) || [];
                const idx = data.findIndex(n => n.id === id);
                data[idx].done = !data[idx].done;
                data[idx].completedOn = data[idx].done ? new Date().toLocaleDateString('en-GB', {day:'numeric', month:'short'}) : null;
                localStorage.setItem('dclinData', JSON.stringify(data));
                renderNotes();
            }, 500);
        }

        function clearAllCompleted() {
            if(!confirm("Wipe completed vault forever?")) return;
            let data = JSON.parse(localStorage.getItem('dclinData')) || [];
            localStorage.setItem('dclinData', JSON.stringify(data.filter(n => !n.done)));
            renderNotes();
        }

        function toggleHelp() {
            const help = document.getElementById('helpContent');
            help.style.display = (help.style.display === 'none') ? 'block' : 'none';
        }

        function fullBackup() {
            const data = localStorage.getItem('dclinData') || "[]";
            const blob = new Blob([data], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.download = "DClin_Vault_Backup.json";
            a.href = url;
            a.click();
            setTimeout(() => URL.revokeObjectURL(url), 100);
        }

        function triggerRestore() { document.getElementById('restoreInput').click(); }

        function handleRestore(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if (Array.isArray(importedData)) {
                        localStorage.setItem('dclinData', JSON.stringify(importedData));
                        renderNotes(); renderCalendar();
                        alert("Vault Restored Successfully!");
                    }
                } catch (err) { alert("Error reading file."); }
                event.target.value = '';
            };
            reader.readAsText(file);
        }

        function exportFilteredNotes() {
            const data = JSON.parse(localStorage.getItem('dclinData')) || [];
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const filtered = data.filter(n => {
                const matchesTag = (archiveFilter === 'All' || n.tag === archiveFilter);
                const matchesSearch = n.text.toLowerCase().includes(searchQuery);
                return (matchesTag && matchesSearch);
            });
            if(filtered.length === 0) return;
            let content = "DCLIN VAULT EXPORT\n\n";
            filtered.forEach(n => { content += `[${n.tag}] ${n.text}\n---\n`; });
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Vault_Export.txt`;
            a.click();
        }

        function renderNotes() {
            const list = document.getElementById('notesList');
            const completedList = document.getElementById('completedList');
            const data = JSON.parse(localStorage.getItem('dclinData')) || [];
            const searchQuery = document.getElementById('searchInput').value.toLowerCase();
            const filtered = data.filter(n => {
                const matchesTag = (archiveFilter === 'All' || n.tag === archiveFilter);
                const matchesDate = !dateFilter || n.created === dateFilter || n.deadline === dateFilter;
                const matchesSearch = n.text.toLowerCase().includes(searchQuery);
                return matchesTag && matchesDate && matchesSearch;
            });
            let activeContent = ""; let doneContent = "";
            filtered.forEach(n => {
                const html = `
                    <div class="note" style="--note-color: ${n.color}">
                        <div class="note-header">
                            <span style="color:${n.color}">${n.tag}</span>
                            <span>${n.done ? 'DONE: ' + n.completedOn : (n.deadline ? 'DUE: ' + n.deadline.split('-').reverse().slice(0,2).join('/') : n.created.split('-').reverse().slice(0,2).join('/'))}</span>
                        </div>
                        <div class="note-body preview-text">${n.text.replace(/\n/g, '<br>')}</div>
                        <button class="action-btn" style="margin: 8px 0; opacity:0.6; color:${n.color}" onclick="toggleExpand(this)">Read More</button>
                        <div class="action-row">
                            ${!n.done ? `<button class="action-btn done-btn" onclick="toggleDone(${n.id}, this)">Done</button>` : `<button class="action-btn" onclick="toggleDone(${n.id}, this)">Restore</button>`}
                            <button class="action-btn" onclick="editNote(${n.id})">Edit</button>
                            <button class="action-btn" style="color:#ff453a" onclick="deleteNote(${n.id})">Del</button>
                        </div>
                    </div>`;
                if(n.done) doneContent += html; else activeContent += html;
            });
            list.innerHTML = activeContent || "<div style='opacity:0.2; text-align:center; padding-top:40px; font-size:12px;'>LIST EMPTY</div>";
            completedList.innerHTML = doneContent;
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid'); grid.innerHTML = "";
            const month = currentCalDate.getMonth();
            const year = currentCalDate.getFullYear();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const data = JSON.parse(localStorage.getItem('dclinData')) || [];
            for(let i = 1; i <= daysInMonth; i++) {
                const dayDiv = document.createElement('div');
                const isToday = i === new Date().getDate() && month === new Date().getMonth();
                dayDiv.className = `cal-day ${isToday ? 'today' : ''}`; dayDiv.innerText = i;
                const dateStr = `${year}-${String(month+1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
                if(data.some(d => d.created === dateStr || d.deadline === dateStr)) dayDiv.innerHTML += '<div class="dot"></div>';
                dayDiv.onclick = () => { dateFilter = dateStr; renderNotes(); document.getElementById('listsHeader').scrollIntoView({ behavior: 'smooth' }); };
                grid.appendChild(dayDiv);
            }
        }

        function toggleExpand(btn) {
            const body = btn.closest('.note').querySelector('.note-body');
            const isPreview = body.classList.toggle('preview-text');
            btn.innerText = isPreview ? "Read More" : "Collapse";
        }

        function toggleCompleted() {
            const v = document.getElementById('completedVault');
            v.style.display = (v.style.display === 'block') ? 'none' : 'block';
        }

        function editNote(id) {
            const data = JSON.parse(localStorage.getItem('dclinData')) || [];
            const n = data.find(note => note.id === id);
            document.getElementById('noteInput').value = n.text;
            document.getElementById('dueDatePicker').value = n.deadline || "";
            updateDateLabel(); editingId = id;
            document.getElementById('saveAction').innerText = "Update";
            const tagIdx = tagLabels.indexOf(n.tag);
            document.getElementById('inputIcons').children[tagIdx].click();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteNote(id) {
            if(confirm("Delete?")) {
                let data = JSON.parse(localStorage.getItem('dclinData')) || [];
                localStorage.setItem('dclinData', JSON.stringify(data.filter(n => n.id !== id)));
                renderNotes(); renderCalendar();
            }
        }

        window.onload = () => { renderCalendar(); renderNotes(); document.getElementById('inputIcons').children[0].click(); };
    </script>
</body>
</html>
